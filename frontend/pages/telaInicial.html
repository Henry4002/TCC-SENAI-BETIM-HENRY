<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneMonth - Tela Inicial</title>
    <link rel="stylesheet" href="../css/telaInicial.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header role="banner">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="btnMenuMobile" aria-expanded="false" aria-controls="menuLateral" class="btn-menu-mobile">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <h2>Página Inicial</h2>
        </div>

        <div class="usuario">
            <div class="perfil">
                <i class="fa-regular fa-circle-user" aria-hidden="true"></i>
                <span id="nomeUsuario" ></span>
            </div>
            <a href="login.html" id="btnLogout" aria-label="Sair do sistema">
                Deslogar <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
            </a>
        </div>
    </header>

    <div class="container">
        
        <aside id="menuLateral" role="complementary" style="width: 250px; background-color: #331E11; padding-top: 20px; color: #fff;"></aside>

        <main id="conteudo-principal" role="main">

            <div>
                <div class="novoProduto" role="button" tabindex="0" onclick="window.location.href='produtos.html'" style="cursor: pointer;"> 
                    <div class="overlay">
                        <i class="fa-solid fa-circle-plus" aria-hidden="true"></i>
                        <h2>Novo Produto</h2>
                    </div>
                </div>

                <div class="estatisticas">
                    <div class="cardEstatistica" aria-live="polite">
                        <i class="fa-solid fa-box" aria-hidden="true"></i>
                        <h3>Produtos Cadastrados</h3>
                        <p id="numProdutos">0</p>
                    </div>
                    <div class="cardEstatistica" aria-live="polite">
                        <i class="fa-solid fa-code-branch" aria-hidden="true"></i>
                        <h3>Versões Cadastradas</h3>
                        <p id="numVersoes">0</p>
                    </div>
                    <div class="cardEstatistica" aria-live="polite">
                        <i class="fa-solid fa-kitchen-set" aria-hidden="true"></i>
                        <h3>Receitas em Produção</h3>
                        <p id="numReceitas">0</p>
                    </div>
                    <div class="cardEstatistica" aria-live="polite">
                        <i class="fa-solid fa-cubes-stacked" aria-hidden="true"></i>
                        <h3>Estoque Baixo</h3>
                        <p id="numEstoqueBaixo">0</p>
                    </div>
                </div>
            </div>

            <section aria-labelledby="titulo-tabela">
                <h2 id="titulo-tabela">Últimos Lotes Cadastrados</h2>
                <table>
                    <thead>
                        <tr>
                            <th scope="col">Lote</th>
                            <th scope="col">Produto</th>
                            <th scope="col">Quantidade</th>
                            <th scope="col">Fabricação</th>
                            <th scope="col">Vencimento</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaUltimosLotes">

                    </tbody>
                </table>
            </section>
        </main>
    </div>
    
    <script src="../js/telaInicial.js"></script>
    <script src="../js/navegacaoLateral.js"></script>
</body>
</html>
