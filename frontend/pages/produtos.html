<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneMonth - Produtos</title>
    <link rel="stylesheet" href="../css/telaInicial.css"> 
    <link rel="stylesheet" href="../css/produtos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header role="banner">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="btnMenuMobile" aria-expanded="false" aria-controls="menuLateral" aria-label="Abrir menu de navegação" class="btn-menu-mobile">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <h2>Gestão de Produtos</h2>
        </div>
        <div class="usuario">
            <div class="perfil">
                <i class="fa-regular fa-circle-user" aria-hidden="true"></i>
                <span>Leandro</span>
            </div>
            <a href="login.html" id="btnLogout" aria-label="Sair do sistema">
                Deslogar
                <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
            </a>    
        </div>
    </header>

    <div class="container">
        
        <aside id="menuLateral">
            <div class="logoLateral">
                <h1>OneMonth</h1>
                <p>Sistema de gestão do ciclo de vida de produtos</p>
            </div>
            <nav aria-label="Navegação Principal">
                <ul>
                    <li tabindex="0"><i class="fa-solid fa-house" aria-hidden="true"></i>Início</li>
                    <li tabindex="0" class="itemAtivo"><i class="fa-solid fa-box" aria-hidden="true"></i>Produtos</li>
                    <li tabindex="0"><i class="fa-solid fa-cubes-stacked" aria-hidden="true"></i>Estoque</li>
                    <li tabindex="0"></li>
                    <li tabindex="0"></li>
                    <li tabindex="0"></li>
                    <li tabindex="0"></li>
                </ul>
            </nav>
        </aside>

        <main role="main">
            <div class="acoes-produtos">
                <div class="busca-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="buscaProduto" placeholder="Buscar produto por nome...">
                </div>
                <button id="btnNovoProduto" class="btn-principal">
                    <i class="fa-solid fa-plus"></i> Novo Produto
                </button>
            </div>

            <section class="atividades">
                <h3>Produtos Cadastrados</h3>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome do Produto</th>
                            <th>Descrição</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaProdutosBody">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="modalCadastro" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cadastrar Novo Produto</h2>
                <button type="button" id="btnFecharModal" class="btn-fechar">&times;</button>
            </div>
            <form id="formCadastroProduto">
                <div class="form-group">
                    <label for="prodNome">Nome do Produto</label>
                    <input type="text" id="prodNome" required placeholder="Ex: Pão de Forma Integral">
                </div>
                
                <div class="form-group">
                    <label for="prodDescricao">Descrição do Produto</label>
                    <textarea id="prodDescricao" required placeholder="Ex: Produzido com farinha 100% integral, macio e sem conservantes." rows="4" style="width: 100%; padding: 10px; border: 1px solid rgba(51,30,17,0.15); border-radius: 6px; font-family: inherit; resize: vertical;"></textarea>
                </div>

                <button type="submit" class="btn-salvar" style="background-color: #DE9E52; margin-top: 10px;">Salvar Produto</button>
            </form>
        </div>
    </div>

    <script src="../js/produtos.js"></script>
</body>
</html>
