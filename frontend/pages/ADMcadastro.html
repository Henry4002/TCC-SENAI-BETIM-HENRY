<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OneMonth | Cadastro de Colaboradores</title>

    <link rel="stylesheet" href="../css/telaInicial.css">
    <link rel="stylesheet" href="../css/ADMcadastro.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="interna-sistema">

    <!-- ================= HEADER ================= -->

    <header>

        <div class="header-esquerda">

            <button id="btnMenuMobile" class="btn-menu-mobile">

                <i class="fa-solid fa-bars"></i>

            </button>

            <h2>Painel Administrativo</h2>

        </div>

        <div class="usuario">

            <div class="perfil">

                <i class="fa-regular fa-circle-user"></i>

                <span>Administrador</span>

            </div>

            <a href="login.html" id="btnLogout">

                Deslogar

                <i class="fa-solid fa-right-from-bracket"></i>

            </a>

        </div>

    </header>

    <!-- ================= CONTAINER ================= -->

    <div class="container">

        <!-- MENU LATERAL -->

        <aside id="menuLateral" class="menu-lateral"></aside>

        <!-- CONTEÚDO -->

        <main class="conteudo-principal">

            <section class="cadastro-secao">
                <div class="card-cadastro">
                
                    <h1>Cadastro de Colaboradores</h1>
                
                    <form id="formCadastro">

    <div class="grupo">
        <label for="nome">Nome</label>
        <div class="campo">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome completo" required>
        </div>
        <p class="erro" id="erroNome" aria-live="polite"></p>
    </div>

    <div class="grupo">
        <label for="senha">senha</label>
        <div class="campo">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required>
            <i class="fa-solid fa-eye" id="toggleSenha"></i>
        </div>
        <div class="forcaSenha" aria-hidden="true">
            <div id="barraForca"></div>
        </div>
        <p id="textoForca" class="texto-forca"></p>
        <p class="erro" id="erroSenha" aria-live="polite"></p>
    </div>

    <div class="grupo">
        <label for="email">Email</label>
        <div class="campo">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="Digite o e-mail" required>
        </div>
        <p class="erro" id="erroEmail" aria-live="polite"></p>
    </div>

    <div class="grupo">
        <label for="confirmarSenha">confirmar senha</label>
        <div class="campo">
            <i class="fa-solid fa-shield-halved"></i>
            <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Repita a senha" required>
            <i class="fa-solid fa-eye" id="toggleConfirmar"></i>
        </div>
        <p class="erro" id="erroConfirmarSenha" aria-live="polite"></p>
    </div>

    <div class="cargo-bloco">
        <label>Cargo do Colaborador</label>
        <div class="opcoes-cargo">
            <label>
                <input type="radio" name="tipoUsuario" value="Administrador" id="tipoUsuario" required> Administrador
            </label>
            <label>
                <input type="radio" name="tipoUsuario" value="Funcionario" required> Funcionário
            </label>
        </div>
        <p class="erro" id="erroTipoUsuario" aria-live="polite"></p>
    </div>

    <input type="hidden" id="usuario" name="usuario" value="">
    <p id="erroUsuario" style="display: none;"></p>

    <div class="linhaBotao">
        <button type="submit" id="btnCadastrar">Cadastrar Colaborador</button>
    </div>

</form>
                
                </div>
            </section>
        
            <section aria-labelledby="titulo-tabela" style="width: 100%; max-width: 850px; background: #FFF; padding: 25px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.08); border: 1px solid rgba(51,30,17,.08);">
                <h2 id="titulo-tabela" style="color: #331E11; margin-bottom: 15px; font-size: 1.4rem;">Colaboradores Cadastrados</h2>
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 2px solid #DE9E52; color: #331E11;">
                            <th style="padding: 10px;">Nome</th>
                            <th style="padding: 10px;">E-mail (Gmail)</th>
                            <th style="padding: 10px;">Usuário</th>
                            <th style="padding: 10px;">Cargo</th>
                            <th style="padding: 10px; text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaUsuarios">
                        </tbody>
                </table>
            </section>

            </main>

    </div>

    <!-- JS -->

    <script src="../js/navegacaoLateral.js"></script>

    <script src="../js/ADMcadastro.js"></script>

</body>

</html>
